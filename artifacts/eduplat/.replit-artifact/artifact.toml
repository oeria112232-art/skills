kind = "web"
previewPath = "/"
title = "EduPlat — Educational & Career Platform"
version = "1.0.0"
id = "artifacts/eduplat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21750

[services.development]
run = "pnpm --filter @workspace/eduplat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eduplat", "run", "build" ]
publicDir = "artifacts/eduplat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21750"
BASE_PATH = "/"
