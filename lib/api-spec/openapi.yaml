openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Educational & Career Development Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: jobs
  - name: applications
  - name: workshops
  - name: exams
  - name: certificates
  - name: tracks
  - name: users
  - name: leaderboard
  - name: stats
  - name: mockInterview

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Jobs ──────────────────────────────────────────────────────────────
  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: companyId
          in: query
          schema:
            type: integer
        - name: remote
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/stats:
    get:
      operationId: getJobStats
      tags: [jobs]
      responses:
        "200":
          description: Job stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStats"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    patch:
      operationId: updateJob
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /jobs/{id}/screening-questions:
    get:
      operationId: getJobScreeningQuestions
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Screening quiz questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScreeningQuestion"
    post:
      operationId: addJobScreeningQuestion
      tags: [jobs]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScreeningQuestionInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningQuestion"

  # ── Applications ──────────────────────────────────────────────────────
  /applications:
    get:
      operationId: listApplications
      tags: [applications]
      parameters:
        - name: jobId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: integer
        - name: companyId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Application"
    post:
      operationId: createApplication
      tags: [applications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInput"
      responses:
        "201":
          description: Applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}:
    get:
      operationId: getApplication
      tags: [applications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"
    patch:
      operationId: updateApplicationStatus
      tags: [applications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Application"

  /applications/{id}/screening:
    post:
      operationId: submitScreening
      tags: [applications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScreeningSubmission"
      responses:
        "200":
          description: Screening result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScreeningResult"

  # ── Workshops ─────────────────────────────────────────────────────────
  /workshops:
    get:
      operationId: listWorkshops
      tags: [workshops]
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of workshops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workshop"
    post:
      operationId: createWorkshop
      tags: [workshops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkshopInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workshop"

  /workshops/{id}:
    get:
      operationId: getWorkshop
      tags: [workshops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workshop detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workshop"
    patch:
      operationId: updateWorkshop
      tags: [workshops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkshopUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workshop"
    delete:
      operationId: deleteWorkshop
      tags: [workshops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workshops/{id}/enroll:
    post:
      operationId: enrollWorkshop
      tags: [workshops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrollInput"
      responses:
        "201":
          description: Enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enrollment"

  /workshops/{id}/enrollments:
    get:
      operationId: listWorkshopEnrollments
      tags: [workshops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enrollment"

  # ── Exams ─────────────────────────────────────────────────────────────
  /workshops/{id}/exam:
    get:
      operationId: getWorkshopExam
      tags: [exams]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exam questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exam"
    post:
      operationId: addExamQuestion
      tags: [exams]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamQuestionInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamQuestion"

  /workshops/{id}/exam/submit:
    post:
      operationId: submitExam
      tags: [exams]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExamSubmission"
      responses:
        "200":
          description: Exam result with optional certificate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExamResult"

  /workshops/{id}/template:
    post:
      operationId: uploadWorkshopTemplate
      tags: [workshops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkshopTemplateUpload"
      responses:
        "200":
          description: Workshop with updated template details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workshop"

  /workshops/{id}/image:
    post:
      operationId: uploadWorkshopImage
      tags: [workshops]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkshopImageUpload"
      responses:
        "200":
          description: Workshop with updated cover image details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workshop"

  # ── Certificates ──────────────────────────────────────────────────────
  /certificates:
    get:
      operationId: listCertificates
      tags: [certificates]
      responses:
        "200":
          description: My certificates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certificate"

  /certificates/{id}:
    get:
      operationId: getCertificate
      tags: [certificates]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Certificate detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"

  /certificates/{id}/claim:
    post:
      operationId: claimCertificate
      tags: [certificates]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Certificate claimed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"

  /certificates/verify/{code}:
    get:
      operationId: verifyCertificate
      tags: [certificates]
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification details
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  error:
                    type: string
                    nullable: true
                  certificate:
                    $ref: "#/components/schemas/Certificate"

  # ── Learning Tracks ───────────────────────────────────────────────────
  /tracks:
    get:
      operationId: listTracks
      tags: [tracks]
      responses:
        "200":
          description: List of learning tracks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Track"

  /tracks/{slug}:
    get:
      operationId: getTrack
      tags: [tracks]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Track with modules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackDetail"

  /tracks/{slug}/progress:
    get:
      operationId: getTrackProgress
      tags: [tracks]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User progress on this track
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackProgress"
    post:
      operationId: updateTrackProgress
      tags: [tracks]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressUpdate"
      responses:
        "200":
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackProgress"

  # ── Users (Admin) ─────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted

  /users/{id}/avatar:
    post:
      operationId: uploadUserAvatar
      tags: [users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAvatarUpload"
      responses:
        "200":
          description: User with updated avatar details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Leaderboard ───────────────────────────────────────────────────────
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Top users by points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # ── Platform Stats ────────────────────────────────────────────────────
  /stats/platform:
    get:
      operationId: getPlatformStats
      tags: [stats]
      responses:
        "200":
          description: Platform-wide stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /stats/admin:
    get:
      operationId: getAdminStats
      tags: [stats]
      responses:
        "200":
          description: Admin dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ── Mock Interview (AI) ───────────────────────────────────────────────
  /mock-interview/message:
    post:
      operationId: sendMockInterviewMessage
      tags: [mockInterview]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockInterviewMessage"
      responses:
        "200":
          description: AI response with feedback
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockInterviewResponse"

  /mock-interview/sessions:
    get:
      operationId: listMockInterviewSessions
      tags: [mockInterview]
      responses:
        "200":
          description: My interview sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MockInterviewSession"
    post:
      operationId: createMockInterviewSession
      tags: [mockInterview]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MockInterviewSessionInput"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockInterviewSession"

  # ── Consultations ───────────────────────────────────────────────
  /consultations:
    get:
      operationId: listConsultations
      tags: [consultations]
      responses:
        "200":
          description: List of consultations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Consultation"
    post:
      operationId: createConsultation
      tags: [consultations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConsultationInput"
      responses:
        "201":
          description: Consultation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consultation"

  /consultations/{id}/reply:
    post:
      operationId: replyToConsultation
      tags: [consultations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyConsultationInput"
      responses:
        "200":
          description: Reply added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Consultation"

  /consultations/{id}/close:
    post:
      operationId: closeConsultation
      tags: [consultations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Consultation closed successfully
          content:
            application/json:
              schema:
                 $ref: "#/components/schemas/Consultation"

  # ── Points Wallet & Transfers ─────────────────────────────────────
  /points/wallet:
    get:
      operationId: getWallet
      tags: [points]
      summary: Get user wallet details and transactions
      responses:
        "200":
          description: Wallet details fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletInfo"

  /points/deposit-request:
    post:
      operationId: createDepositRequest
      tags: [points]
      summary: Submit a bank transfer deposit proof to admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepositRequestInput"
      responses:
        "201":
          description: Deposit request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositRequest"

  /points/transfer/verify:
    post:
      operationId: verifyTransfer
      tags: [points]
      summary: Verify recipient email and check balance before transfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyTransferInput"
      responses:
        "200":
          description: Verification response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyTransferOutput"

  /points/transfer/confirm:
    post:
      operationId: confirmTransfer
      tags: [points]
      summary: Confirm and execute the points transfer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmTransferInput"
      responses:
        "200":
          description: Transfer executed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfirmTransferOutput"

  # ── Admin Deposit Requests ─────────────────────────────────────────
  /admin/deposit-requests:
    get:
      operationId: listDepositRequests
      tags: [points]
      summary: List all deposit requests for admin approval
      responses:
        "200":
          description: List of deposit requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DepositRequest"

  /admin/deposit-requests/{id}/approve:
    post:
      operationId: approveDepositRequest
      tags: [points]
      summary: Approve a deposit request and credit points
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveDepositInput"
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositRequest"

  /admin/deposit-requests/{id}/reject:
    post:
      operationId: rejectDepositRequest
      tags: [points]
      summary: Reject a deposit request
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectDepositInput"
      responses:
        "200":
          description: Request rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DepositRequest"

